<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
  
  <!-- JSON-LD Person Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ .Site.Params.author }}",
    "jobTitle": "{{ .Site.Params.jobTitle }}",
    "url": "{{ .Site.BaseURL }}",
    "knowsAbout": [
      {{ range $index, $element := .Site.Params.knowsAbout }}
        {{ if $index }},{{ end }}"{{ $element }}"
      {{ end }}
    ],
    "sameAs": [
      "{{ .Site.Params.medium }}",
      "{{ .Site.Params.github }}",
      "{{ .Site.Params.linkedin }}"
    ]
  }
  </script>
</head>
<body>
  <header>
    <h1>{{ .Site.Title }}</h1>
    <nav>
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </header>
  
  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <p>&copy; {{ now.Format "2006" }} {{ .Site.Params.author }} | Digital Entity</p>
  </footer>
</body>
</html>
